<!doctype html>
<html>
    <head> 
        <title> Student evaluation</title>
        <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    </head>
    <body>
          <center>
       <h2>Student Evaluation</h2>
      
        <form id  = "login-form" >
            <label for="name">Name:</label><br>
            <input type = "name" id="name" placeholder="Name"><br><br>
            <label for="profName">Professor Name:</label><br>
            <input type = "profName" id="profName" placeholder="Professor Name"><br><br>
            <label for="p1">P1 Grades:</label><br>
            <input type = "p1" id="p1" placeholder="Enter P1 Grades">
            <br>
            <button type = "button" onclick = "checkGrade()" style = "color:blue">CheckGrade</button>
            <p id="result"></p>
          
        </form>
    </center>
        <script>
            function checkGrade() {
            let grade = document.getElementById("p1").value;
            let professorName = document.getElementById("profName").value;
          
            if (grade>= 80){
                
                document.getElementById("result").innerHTML ="Professors Name: " + document.getElementById("profName").value  + "<br>" + "Student Name: " + document.getElementById("name").value + "<br>" + "your P1 grade " + document.getElementById("name").value + " " + "is " + " passed";
              }else{
                
                document.getElementById("result").innerHTML = "Professors Name:  " + document.getElementById("profName").value + "<br>" + "Student Name: " + document.getElementById("name").value + "<br>" + "your P1 grade " + document.getElementById("name").value + " " + "is " + " failed";
            }
           
            }

        </script>


    </body>
</html>
